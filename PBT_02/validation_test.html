<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Kiểm tra xác thực HTML5</title>
    <style>
        form { margin: 20px; line-height: 2.5; }
        label { display: inline-block; width: 150px; }
        .case { margin-bottom: 15px; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
    </style>
</head>
<body>
    <h1>Bài tập A2 - Validation Test</h1>
    <form>
        <div class="case">
            <label>Trường hợp 1:</label>
            <input type="text" required value="" placeholder="Để trống...">
        </div>

        <div class="case">
            <label>Trường hợp 2:</label>
            <input type="email" value="abc">
        </div>

        <div class="case">
            <label>Trường hợp 3:</label>
            <input type="number" min="1" max="10" value="15">
        </div>

        <div class="case">
            <label>Trường hợp 4:</label>
            <input type="text" pattern="[0-9]{10}" value="abc123">
        </div>

        <div class="case">
            <label>Trường hợp 5:</label>
            <input type="password" minlength="8" value="123">
        </div>

        <button type="submit">Gửi để kiểm tra</button>
    </form>
</body>
</html>
