<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đa phương tiện - Như Ý Store</title>
</head>
<body>

    <header>
        <svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="40" stroke="blue" stroke-width="4" fill="lightblue" />
            <text x="50%" y="50%" text-anchor="middle" fill="white" font-size="12px" dy=".3em">NY Store</text>
        </svg>
        <h1>Trải nghiệm Sản phẩm Đa phương tiện</h1>
    </header>

    <main>
        <section id="gallery">
            <h2>Bộ sưu tập sản phẩm</h2>
            
            <figure>
                <img src="https://placehold.co/400x300" alt="Điện thoại iPhone 16 màu Titan Sa Mạc" loading="lazy" style="max-width: 100%; height: auto;">
                <figcaption>Hình 1: iPhone 16 Pro Max với lớp vỏ Titan cực bền.</figcaption>
            </figure>

            <figure>
                <img src="https://placehold.co/400x300" alt="Tai nghe chống ồn Sony WH-1000XM5" loading="lazy" style="max-width: 100%; height: auto;">
                <figcaption>Hình 2: Trải nghiệm âm thanh đỉnh cao cùng Sony.</figcaption>
            </figure>

            <figure>
                <img src="https://placehold.co/400x300" alt="Đồng hồ Apple Watch Series 10" loading="lazy" style="max-width: 100%; height: auto;">
                <figcaption>Hình 3: Apple Watch hỗ trợ theo dõi sức khỏe thông minh.</figcaption>
            </figure>
        </section>

        <hr>

        <section id="youtube-video">
            <h2>Video Review từ YouTube</h2>
            <iframe width="560" height="315" 
                src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
                title="YouTube video player" 
                frameborder="0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
            </iframe>
        </section>

        <hr>

        <section id="local-video">
            <h2>Video giới thiệu thực tế</h2>
            <video controls poster="https://placehold.co/600x400?text=Bam+de+xem+video" width="600">
                <source src="movie.mp4" type="video/mp4">
                <source src="movie.webm" type="video/webm">
                Trình duyệt của bạn không hỗ trợ thẻ video này.
            </video>
        </section>

        <hr>

        <section id="audio-intro">
            <h2>Nhạc nền giới thiệu</h2>
            <p>Nghe nhạc nhẹ trong khi tham khảo sản phẩm:</p>
            <audio controls>
                <source src="intro-music.mp3" type="audio/mpeg">
                Trình duyệt của bạn không hỗ trợ thẻ audio này.
            </audio>
        </section>

    </main>

    <footer>
        <p>&copy; 2026 Nguyễn Thị Như Ý - ĐH Thủy Lợi</p>
    </footer>

</body>
</html>
