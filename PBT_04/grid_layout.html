<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Grid Layout</title>
    <link rel="stylesheet" href="grid.css">
</head>
<body>

    <div class="app-container">
        <!-- HEADER -->
        <header class="header">
            <div class="logo">E-Shop Grid</div>
            <div class="search-bar">Tìm kiếm sản phẩm...</div>
            <div class="cart">Giỏ hàng (0)</div>
        </header>

        <!-- HERO BANNER -->
        <section class="hero">
            <div class="hero-content">
                <h1>XẢ KHO ĐÓN HÈ - GIẢM ĐẾN 50%</h1>
                <p>Áp dụng cho toàn bộ ngành hàng công nghệ từ hôm nay.</p>
                <button class="btn-shop">Mua Ngay</button>
            </div>
        </section>

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <h3>Bộ lọc sản phẩm</h3>
            <div class="filter-group">
                <h4>Danh mục</h4>
                <label><input type="checkbox" checked> Điện thoại</label>
                <label><input type="checkbox"> Laptop</label>
                <label><input type="checkbox"> Phụ kiện</label>
            </div>
            <div class="filter-group">
                <h4>Khoảng giá</h4>
                <label><input type="radio" name="price"> Dưới 5 triệu</label>
                <label><input type="radio" name="price"> 5 - 15 triệu</label>
                <label><input type="radio" name="price"> Trên 15 triệu</label>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <div class="product-grid">
                <!-- Vị trí các Product Cards sẽ thêm ở Phần 2 -->
            </div>
        </main>

        <!-- ADS SIDEBAR -->
        <aside class="ads">
            <div class="ads-banner">
                <p>QUẢNG CÁO</p>
                <span>Săn Hot Deal iPhone 15 Pro Max tại đây!</span>
            </div>
        </aside>

        <!-- FOOTER -->
        <footer class="footer">
            <p>&copy; 2026 E-Shop Grid Layout Assignment. All rights reserved.</p>
        </footer>
    </div>

</body>
</html>
